services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: pagescms
      POSTGRES_PASSWORD: pagescms
      POSTGRES_DB: pagescms
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pagescms"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://pagescms:pagescms@db:5432/pagescms
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
